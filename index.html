<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>AI · Inspiration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #D6D9DD;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --tile-bg: #ffffff;
      --tile-shadow: 0 1px 2px rgba(0,0,0,.05), 0 2px 6px rgba(0,0,0,.04);
      --tile-shadow-hover: 0 1px 2px rgba(0,0,0,.06), 0 6px 14px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
      color: var(--ink);
      overscroll-behavior: none;
      touch-action: none;
    }

    /* Pan/zoom stage */
    #viewport { position: absolute; inset: 0; cursor: grab; }
    #viewport.grabbing { cursor: grabbing; }
    /* will-change on the parent (the only thing actually transformed) — NOT on
     * each tile, which would create thousands of GPU layers. */
    #canvas { position: relative; transform-origin: 0 0; will-change: transform; }

    /* Tile */
    .tile {
      position: absolute;
      box-sizing: content-box; /* opt out of the global border-box so width = inner content; padding extends external size */
      background: #212121;
      border-radius: 16px;
      padding: 8px 8px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      color: #e8e8e8;
      transition: box-shadow .2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.06);
      -webkit-user-drag: none;
      user-select: none;
      contain: layout paint;
    }
    .tile img, .tile video { -webkit-user-drag: none; pointer-events: none; }
    .tile:hover { box-shadow: 0 1px 2px rgba(0,0,0,.08), 0 8px 20px rgba(0,0,0,.10); }

    .tile .media {
      position: relative;
      width: 100%;
      background: #2a2a2a;
      overflow: hidden;
      border-radius: 16px;
    }
    .tile .media img.poster,
    .tile .media video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .tile .media video {
      opacity: 0;
      transition: opacity .35s ease;
    }
    .tile.playing .media video { opacity: 1; }

    .tile .meta {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
      font-size: 12px; line-height: 1;
      color: #e8e8e8;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tile .meta .src { padding-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tile .meta .ext {
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      color: #e8e8e8; text-decoration: none;
      border-radius: 6px;
      opacity: .85;
      transition: background .15s ease, opacity .15s ease;
    }
    .tile:hover .meta .ext { opacity: 1; }
    .tile .meta .ext:hover { background: rgba(255,255,255,.08); }
    .tile .meta .ext svg { display: block; }

    /* Loading skeleton — subtle on dark bg */
    .tile .media::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.06) 50%, transparent 70%);
      transform: translateX(-100%);
      animation: shimmer 1.6s ease-in-out infinite;
      pointer-events: none;
    }
    .tile.loaded .media::before { display: none; }
    @keyframes shimmer { to { transform: translateX(100%); } }

    /* ── Intro wipe (lifted from portfolio.html) ── */
    #intro-overlay {
      position: fixed; inset: 0; z-index: 99999;
      pointer-events: all;
      cursor: none;
    }
    #intro-top, #intro-bot {
      position: absolute; left: 0; right: 0;
      background: #000;
      will-change: transform;
    }
    #intro-top { top: 0; height: 50.2%; }
    #intro-bot { bottom: 0; height: 50.2%; }
    #intro-lc  { position: absolute; inset: 0; pointer-events: none; }
  </style>
</head>
<body>

  <!-- Intro wipe overlay -->
  <div id="intro-overlay" aria-hidden="true">
    <div id="intro-top"></div>
    <div id="intro-bot"></div>
    <canvas id="intro-lc"></canvas>
  </div>

  <div id="viewport">
    <div id="canvas"></div>
  </div>

  <script src="vendor/panzoom.min.js"></script>
  <script>
  (async function () {
    const manifest = await fetch('items.json').then(r => r.json());

    const canvas = document.getElementById('canvas');
    canvas.style.width = (manifest.canvas?.width || 3000) + 'px';
    canvas.style.height = (manifest.canvas?.height || 2000) + 'px';

    // --- Tile factory ---
    function createTile(item, offsetX, offsetY) {
      const tile = document.createElement('div');
      tile.className = `tile tile-${item.type}`;
      tile.style.left = (item.x + offsetX) + 'px';
      tile.style.top  = (item.y + offsetY) + 'px';
      tile.style.width = item.w + 'px';
      // Cached dimensions — read in rebalancePlaying to avoid getBoundingClientRect.
      tile.dataset.w = item.w;
      tile.dataset.h = item.h + META_H;

      const media = document.createElement('div');
      media.className = 'media';
      media.style.aspectRatio = `${item.w} / ${item.h}`;

      if (item.type === 'video') {
        const poster = document.createElement('img');
        poster.className = 'poster';
        poster.src = `media/${item.slug}.jpg`;
        poster.alt = '';
        poster.loading = 'lazy';
        poster.onload = () => tile.classList.add('loaded');
        media.appendChild(poster);
        tile.dataset.video = `media/${item.slug}.mp4`;
      } else if (item.type === 'image') {
        const img = document.createElement('img');
        img.className = 'poster';
        img.src = `media/${item.slug}.jpg`;
        img.alt = '';
        img.loading = 'lazy';
        img.onload = () => tile.classList.add('loaded');
        media.appendChild(img);
      }
      tile.appendChild(media);

      const meta = document.createElement('div');
      meta.className = 'meta';
      const arrowSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>`;
      meta.innerHTML = `
        <span class="src">${item.author || item.slug}</span>
        ${item.source ? `<a class="ext" href="${item.source}" target="_blank" rel="noopener" title="Open on X">${arrowSvg}</a>` : ''}
      `;
      tile.appendChild(meta);
      return tile;
    }

    // --- Compute world (single-copy) bounds for tiling ---
    // CARD_PAD covers the dark-card padding (8px sides, 16px bottom + 8px top
    // = 24px vertical). META_H is the full height the card adds beyond the
    // image: top-pad + gap + meta-row + bottom-pad = 8 + 8 + 24 + 16 = 56.
    const META_H = 56;
    const CARD_PAD_X = 16; // 8px each side
    const oneItems = manifest.items;
    const oneBounds = {
      minX: Math.min(...oneItems.map(i => i.x)),
      minY: Math.min(...oneItems.map(i => i.y)),
      maxX: Math.max(...oneItems.map(i => i.x + i.w + CARD_PAD_X)),
      maxY: Math.max(...oneItems.map(i => i.y + i.h + META_H)),
    };
    const GUTTER = 32;
    const worldW = (oneBounds.maxX - oneBounds.minX) + GUTTER;
    const worldH = (oneBounds.maxY - oneBounds.minY) + GUTTER;

    // --- Truly infinite tiling via cell recycling ---
    // Render a fixed pool of copies (5×5 grid = 25 per item). On every pan,
    // each copy re-snaps to the closest cell around the current viewport
    // center. Effect: as you pan, off-screen copies teleport to the opposite
    // side, so there's always content in every direction. The 5×5 size means
    // recycling happens 2 cells from center — well off-screen even at minZoom.
    // 1 → 3×3 grid (9 copies). With minZoom=0.7 the cell-recycle boundary is
    // still off-screen, and the DOM shrinks from ~1900 nodes to ~684 — the
    // single biggest win for canvas perf at this item count.
    const COPY_RADIUS = 1;
    const COPY_OFFSETS = [];
    for (let dy = -COPY_RADIUS; dy <= COPY_RADIUS; dy++) {
      for (let dx = -COPY_RADIUS; dx <= COPY_RADIUS; dx++) {
        COPY_OFFSETS.push([dx, dy]);
      }
    }

    const instances = []; // { tile, item, copyIdx }
    const tiles = [];
    const videoTiles = []; // subset — used by rebalancePlaying
    for (const item of oneItems) {
      for (let i = 0; i < COPY_OFFSETS.length; i++) {
        const tile = createTile(item, 0, 0);
        canvas.appendChild(tile);
        tiles.push(tile);
        instances.push({ tile, item, copyIdx: i });
        if (item.type === 'video') videoTiles.push(tile);
      }
    }

    // Reposition all instances around the viewport center. Cheap because we
    // skip the work entirely when the viewport hasn't crossed a cell boundary.
    const itemCenterX = (oneBounds.minX + oneBounds.maxX) / 2;
    const itemCenterY = (oneBounds.minY + oneBounds.maxY) / 2;
    let lastCellX = NaN, lastCellY = NaN;

    function repositionInstances() {
      const t = pz.getTransform();
      const cx = (window.innerWidth  / 2 - t.x) / t.scale;
      const cy = (window.innerHeight / 2 - t.y) / t.scale;
      const baseCellX = Math.round((cx - itemCenterX) / worldW);
      const baseCellY = Math.round((cy - itemCenterY) / worldH);
      if (baseCellX === lastCellX && baseCellY === lastCellY) return;
      lastCellX = baseCellX;
      lastCellY = baseCellY;
      for (const { tile, item, copyIdx } of instances) {
        const [dx, dy] = COPY_OFFSETS[copyIdx];
        tile.style.left = (item.x + (baseCellX + dx) * worldW) + 'px';
        tile.style.top  = (item.y + (baseCellY + dy) * worldH) + 'px';
      }
    }

    // --- Lazy video playback ---
    // Picks the MAX_PLAYING video tiles closest to the viewport center, every
    // ~100ms during pan and immediately on panend. Math-based intersection
    // (no getBoundingClientRect) — important because BCR forces a layout flush,
    // and 30+ flushes per frame is the main cause of pan stutter at this scale.
    const MAX_PLAYING = 12;
    const TEARDOWN_MS = 2500; // grace period before fully ripping down a paused video
    const teardownTimers = new WeakMap();

    function createVideoEl(tile) {
      const v = document.createElement('video');
      v.src = tile.dataset.video;
      v.muted = true;
      v.loop = true;
      v.playsInline = true;
      v.autoplay = true;
      v.preload = 'auto';
      tile.querySelector('.media').appendChild(v);
      return v;
    }

    function startVideo(tile) {
      // Cancel any pending teardown — tile is back in the playing set
      const t = teardownTimers.get(tile);
      if (t) { clearTimeout(t); teardownTimers.delete(tile); }
      const v = tile.querySelector('video') || createVideoEl(tile);
      v.play().catch(() => {});
      tile.classList.add('playing');
    }

    function stopVideo(tile) {
      // Pause now, schedule full teardown later. If the tile re-enters the
      // playing set within TEARDOWN_MS, startVideo cancels the timer — we
      // skip the cost of recreating the <video> element and re-buffering.
      const v = tile.querySelector('video');
      if (v) v.pause();
      tile.classList.remove('playing');
      if (teardownTimers.has(tile)) return;
      const timer = setTimeout(() => {
        teardownTimers.delete(tile);
        const v2 = tile.querySelector('video');
        if (v2 && !tile.classList.contains('playing')) {
          v2.removeAttribute('src');
          v2.load();
          v2.remove();
        }
      }, TEARDOWN_MS);
      teardownTimers.set(tile, timer);
    }

    function rebalancePlaying() {
      const tx = pz.getTransform();
      const scale = tx.scale, panX = tx.x, panY = tx.y;
      const vw = window.innerWidth, vh = window.innerHeight;
      const vcx = vw / 2, vcy = vh / 2;

      const candidates = [];
      for (const tile of videoTiles) {
        const wx = parseFloat(tile.style.left);
        const wy = parseFloat(tile.style.top);
        const ww = +tile.dataset.w;
        const wh = +tile.dataset.h;
        // Tile rect in viewport coords (no DOM read)
        const left   = wx * scale + panX;
        const top    = wy * scale + panY;
        const right  = left + ww * scale;
        const bottom = top  + wh * scale;
        // Viewport intersection check with small margin
        if (right < -100 || left > vw + 100 || bottom < -100 || top > vh + 100) {
          if (tile.classList.contains('playing')) stopVideo(tile);
          continue;
        }
        const dx = (left + right) / 2 - vcx;
        const dy = (top  + bottom) / 2 - vcy;
        candidates.push({ tile, d: dx * dx + dy * dy });
      }
      candidates.sort((a, b) => a.d - b.d);
      const shouldPlay = new Set(candidates.slice(0, MAX_PLAYING).map(c => c.tile));
      for (const { tile } of candidates) {
        const isPlaying = tile.classList.contains('playing');
        if (shouldPlay.has(tile) && !isPlaying)      startVideo(tile);
        else if (!shouldPlay.has(tile) && isPlaying) stopVideo(tile);
      }
    }

    let rebalanceTimer = null;
    function queueRebalance() {
      if (rebalanceTimer !== null) return;
      rebalanceTimer = setTimeout(() => {
        rebalanceTimer = null;
        rebalancePlaying();
      }, 100);
    }
    function flushRebalance() {
      if (rebalanceTimer !== null) { clearTimeout(rebalanceTimer); rebalanceTimer = null; }
      rebalancePlaying();
    }

    // --- Pan/zoom ---
    const viewport = document.getElementById('viewport');
    // minZoom is tightened so users can't zoom out far enough to see dozens
    // of tiny tiles competing for playback slots. At 0.7, viewport shows
    // roughly 1.5 columns at full tile width.
    const pz = panzoom(canvas, {
      maxZoom: 3,
      minZoom: 0.7,
      bounds: false,
      smoothScroll: false,
      zoomDoubleClickSpeed: 1, // disable double-click zoom so links work
      // No drag-suppression on tiles — pan from anywhere. Panzoom only
      // suppresses the click event if the pointer moved past its threshold,
      // so a no-movement click on a tile still navigates.
    });

    pz.on('panstart', () => viewport.classList.add('grabbing'));
    pz.on('panend',   () => {
      viewport.classList.remove('grabbing');
      flushRebalance(); // settle the playing set immediately when the user lets go
    });
    pz.on('transform', () => {
      repositionInstances();
      queueRebalance(); // playing set follows the viewport (throttled to 100ms)
    });
    // Initial view: zoomed in to roughly native tile size, top-aligned.
    function initialView() {
      const vw = window.innerWidth;
      const TARGET_VISIBLE_COLS = 2.5;
      const COL_W = 460;
      const targetW = TARGET_VISIBLE_COLS * COL_W + (TARGET_VISIBLE_COLS - 1) * GUTTER;
      const padding = 40;
      const scale = Math.min(1.0, (vw - padding * 2) / targetW);

      const contentW = oneBounds.maxX - oneBounds.minX;
      const tx = (vw - contentW * scale) / 2 - oneBounds.minX * scale;
      const ty = 40 - oneBounds.minY * scale; // small top breathing room

      pz.zoomAbs(0, 0, scale);
      pz.moveTo(tx, ty);
    }

    initialView();
    window.addEventListener('resize', initialView);
    document.addEventListener('keydown', (e) => { if (e.key === '0') initialView(); });
  })();
  </script>

  <!-- ── Intro wipe animation (lifted from portfolio.html) ── -->
  <script>
  (function () {
    const overlay  = document.getElementById('intro-overlay');
    const topPanel = document.getElementById('intro-top');
    const botPanel = document.getElementById('intro-bot');
    const lc       = document.getElementById('intro-lc');
    if (!overlay || !lc) return;

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const LW  = window.innerWidth;
    const LH  = window.innerHeight;
    lc.width  = LW * dpr;
    lc.height = LH * dpr;
    lc.style.width  = LW + 'px';
    lc.style.height = LH + 'px';

    const ctx = lc.getContext('2d');
    ctx.scale(dpr, dpr);

    /* ── text layout ── */
    const TEXT     = 'Welcome to the Digital Assets AI workshop';
    const fontSize = Math.min(40, Math.max(20, LW / 26));
    const FONT     = `400 ${fontSize}px "Inter", sans-serif`;

    ctx.font         = FONT;
    ctx.textBaseline = 'middle';
    ctx.textAlign    = 'left';

    const totalW = ctx.measureText(TEXT).width;
    const startX = (LW - totalW) / 2;
    const textY  = LH / 2;

    /* one object per character */
    const letters = [];
    let cx = startX;
    for (const ch of TEXT) {
      const w = ctx.measureText(ch).width;
      letters.push({
        char: ch, w,
        ox: cx, oy: textY,
        x: cx,  y: textY,
        visible: false, knocked: false,
        alpha: 1, vx: 0, vy: 0, va: 0, angle: 0, gravity: 0,
      });
      cx += w;
    }

    /* ── particles ── */
    const particles = [];
    function spawnParticles(x, y, n) {
      for (let i = 0; i < n; i++) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 1.1,
          vy: dir * (1.2 + Math.random() * 2.6),
          life: 1,
          decay: 0.022 + Math.random() * 0.030,
          r: 0.65 + Math.random() * 1.4,
        });
      }
    }

    function knock(l) {
      l.knocked = true;
      const dir = Math.random() < 0.58 ? -1 : 1;
      l.vx      = (Math.random() - 0.28) * 8;
      l.vy      = dir * (5 + Math.random() * 10);
      l.va      = (Math.random() - 0.5) * 0.38;
      l.gravity = 0.22 + Math.random() * 0.20;
    }

    /* ── timing ── */
    const CHAR_MS = 50;   /* per-character typing pace */
    const WAIT_MS = 900;  /* pause after full text */
    const LINE_MS = 380;  /* line sweep duration */

    function easeOut(t) { return 1 - Math.pow(1 - t, 2.8); }

    let t0 = null, lastCharTs = null;
    let typedCount = 0;
    let phase = 'typing';
    let phaseTs = null;
    let lineX = 0, peeled = false;

    /* blinking cursor */
    let cursorVisible = true;
    const cursorTimer = setInterval(() => { cursorVisible = !cursorVisible; }, 520);

    /* ── Win95 canvas cursor ── */
    const win95 = {
      x: LW / 2, y: LH / 2,
      vx: 0, vy: 0, angle: 0, va: 0,
      alpha: 1, falling: false, knocked: false,
    };
    overlay.addEventListener('mousemove', e => {
      if (!win95.falling) { win95.x = e.clientX; win95.y = e.clientY; }
    });
    function drawWin95Cursor(x, y, angle, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0,   0);
      ctx.lineTo(0,   19);
      ctx.lineTo(4.5, 14);
      ctx.lineTo(7.5, 21);
      ctx.lineTo(10,  20);
      ctx.lineTo(7,   13);
      ctx.lineTo(11,  13);
      ctx.closePath();
      /* Inverted for dark mode: dark stroke, white fill */
      ctx.strokeStyle = '#0a0a0e';
      ctx.lineWidth   = 1.8;
      ctx.lineJoin    = 'round';
      ctx.stroke();
      ctx.fillStyle   = '#f0f0f2';
      ctx.fill();
      ctx.restore();
    }

    function frame(ts) {
      if (!t0) { t0 = ts; lastCharTs = ts; phaseTs = ts; }
      ctx.clearRect(0, 0, LW, LH);
      const cy = LH / 2;

      if (phase === 'typing') {
        if (typedCount < letters.length) {
          if (ts - lastCharTs >= CHAR_MS) {
            letters[typedCount].visible = true;
            typedCount++;
            lastCharTs = ts;
          }
        } else if (ts - lastCharTs >= WAIT_MS) {
          phase = 'sweeping';
          phaseTs = ts;
          clearInterval(cursorTimer);
        }
      }

      if (phase === 'sweeping') {
        const lineT = Math.min((ts - phaseTs) / LINE_MS, 1);
        lineX = easeOut(lineT) * LW;

        for (const l of letters) {
          if (!l.knocked && l.visible && lineX >= l.ox) {
            knock(l);
            spawnParticles(l.ox + l.w / 2, cy, 5);
          }
        }

        if (!win95.knocked && lineX >= win95.x) {
          win95.knocked = true;
          win95.falling = true;
          win95.vy = 8 + Math.random() * 5;
          win95.vx = (Math.random() - 0.5) * 3;
          win95.va = (Math.random() - 0.5) * 0.10;
          spawnParticles(win95.x + 5, win95.y + 10, 6);
        }

        if (!peeled) {
          /* glowing white beam */
          ctx.shadowBlur  = 10;
          ctx.shadowColor = 'rgba(220,232,255,0.85)';
          ctx.strokeStyle = 'rgba(255,255,255,0.95)';
          ctx.lineWidth   = 1.6;
          ctx.beginPath();
          ctx.moveTo(0, cy);
          ctx.lineTo(lineX, cy);
          ctx.stroke();
          ctx.shadowBlur = 0;

          /* leading halo — bright white */
          const g = ctx.createRadialGradient(lineX, cy, 0, lineX, cy, 28);
          g.addColorStop(0, 'rgba(255,255,255,0.45)');
          g.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = g;
          ctx.fillRect(lineX - 28, cy - 28, 56, 56);

          /* leading dot — already white, slightly stronger glow */
          ctx.shadowBlur  = 14;
          ctx.shadowColor = 'rgba(220,232,255,0.95)';
          ctx.fillStyle   = 'rgba(255,255,255,1)';
          ctx.beginPath();
          ctx.arc(lineX, cy, 3.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        if (lineT < 1) spawnParticles(lineX, cy, 2);

        if (lineT >= 1 && !peeled) {
          peeled = true;
          setTimeout(() => {
            const ease = 'cubic-bezier(0.76, 0, 0.24, 1)';
            topPanel.style.transition = `transform 0.58s ${ease}`;
            botPanel.style.transition = `transform 0.58s ${ease}`;
            topPanel.style.transform  = 'translateY(-101%)';
            botPanel.style.transform  = 'translateY(101%)';
            setTimeout(() => {
              overlay.style.display = 'none';
              phase = 'done';
              window.__introDone = true;
              window.dispatchEvent(new Event('intro-done'));
            }, 640);
          }, 55);
        }
      }

      ctx.font         = FONT;
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'left';

      for (const l of letters) {
        if (!l.visible) continue;
        if (l.knocked) {
          l.x     += l.vx;
          l.y     += l.vy;
          l.vy    += l.gravity;
          l.angle += l.va;
          l.alpha  = Math.max(0, l.alpha - 0.020);
          if (l.alpha <= 0) continue;

          ctx.save();
          ctx.globalAlpha = l.alpha;
          ctx.translate(l.x + l.w / 2, l.y);
          ctx.rotate(l.angle);
          ctx.textAlign = 'center';
          ctx.fillStyle = '#e8e8ea';
          ctx.fillText(l.char, 0, 0);
          ctx.restore();
        } else {
          ctx.fillStyle = '#e8e8ea';
          ctx.fillText(l.char, l.ox, l.oy);
        }
      }

      if (phase === 'typing' && typedCount > 0 && cursorVisible) {
        const last = letters[typedCount - 1];
        const cw   = last.w;
        const ch   = fontSize * 0.88;
        ctx.fillStyle = 'rgba(232,232,234,0.88)';
        ctx.fillRect(last.ox + last.w + 1, textY - ch / 2, cw, ch);
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.07;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.fillStyle = `rgba(232,232,234,${(p.life * 0.70).toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      }

      if (win95.falling) {
        win95.x     += win95.vx;
        win95.y     += win95.vy;
        win95.vy    += 0.55;
        win95.angle += win95.va;
      }
      if (win95.alpha > 0 && win95.y < LH + 40) {
        drawWin95Cursor(win95.x, win95.y, win95.angle, win95.alpha);
      }

      if (phase !== 'done' || particles.length > 0) requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
